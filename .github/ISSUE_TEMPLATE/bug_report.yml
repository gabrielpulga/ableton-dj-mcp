name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the fields below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call adj-create-clip with...
        2. Then adj-update-clip...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 1.4.5
    validations:
      required: true

  - type: input
    id: ableton
    attributes:
      label: Ableton Live version
      placeholder: e.g. 12.3.0
    validations:
      required: true
